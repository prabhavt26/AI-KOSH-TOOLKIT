apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-assessment
  namespace: aikosh-quality-toolkit
  labels:
    app: worker-assessment
spec:
  replicas: 3 # HPA will scale this from 3 to 20 replicas based on queue length
  selector:
    matchLabels:
      app: worker-assessment
  template:
    metadata:
      labels:
        app: worker-assessment
    spec:
      containers:
        - name: worker-assessment
          image: aikosh-quality-toolkit-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.worker.celery_app:celery_app
            - worker
            - -Q
            - assessment
            - -c
            - "4"
            - --loglevel=info
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: aikosh_quality
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: S3_ENDPOINT_URL
              value: ""
            - name: S3_ACCESS_KEY
              value: YOUR_AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              value: YOUR_AWS_SECRET_ACCESS_KEY
            - name: S3_BUCKET_NAME
              value: aikosh-datasets
            - name: S3_REGION
              value: us-east-1
            - name: API_KEY_SECRET
              value: tkt_secret_super_secure_key_12345678
            - name: JWT_SECRET
              value: supersecretjwtsessionkeychangeinproduction123456!
            - name: AIKOSH_WEBHOOK_URL
              value: ""
            - name: AIKOSH_WEBHOOK_SECRET
              value: ""
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-webhook
  namespace: aikosh-quality-toolkit
  labels:
    app: worker-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-webhook
  template:
    metadata:
      labels:
        app: worker-webhook
    spec:
      containers:
        - name: worker-webhook
          image: aikosh-quality-toolkit-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.worker.celery_app:celery_app
            - worker
            - -Q
            - webhook
            - -c
            - "2"
            - --loglevel=info
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: aikosh_quality
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: S3_ENDPOINT_URL
              value: ""
            - name: S3_ACCESS_KEY
              value: YOUR_AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              value: YOUR_AWS_SECRET_ACCESS_KEY
            - name: S3_BUCKET_NAME
              value: aikosh-datasets
            - name: S3_REGION
              value: us-east-1
            - name: API_KEY_SECRET
              value: tkt_secret_super_secure_key_12345678
            - name: JWT_SECRET
              value: supersecretjwtsessionkeychangeinproduction123456!
            - name: AIKOSH_WEBHOOK_URL
              value: ""
            - name: AIKOSH_WEBHOOK_SECRET
              value: ""
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
