apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aikosh-quality-toolkit
  labels:
    app: api
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aikosh-quality-toolkit
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: aikosh-quality-toolkit-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: aikosh_quality
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: S3_ENDPOINT_URL
              value: ""
            - name: S3_ACCESS_KEY
              value: YOUR_AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              value: YOUR_AWS_SECRET_ACCESS_KEY
            - name: S3_BUCKET_NAME
              value: aikosh-datasets
            - name: S3_REGION
              value: us-east-1
            - name: API_KEY_SECRET
              value: tkt_secret_super_secure_key_12345678
            - name: JWT_SECRET
              value: supersecretjwtsessionkeychangeinproduction123456!
            - name: AIKOSH_WEBHOOK_URL
              value: ""
            - name: AIKOSH_WEBHOOK_SECRET
              value: ""
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
